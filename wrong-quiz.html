<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f5f0eb">
<meta name="referrer" content="no-referrer">
<title>오답 Self Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
  html,body{width:100%;height:100%;background:#f5f0eb;font-family:'Gowun Dodum',sans-serif;color:#1a1a2e;overflow:hidden;-webkit-text-size-adjust:100%;overscroll-behavior:none;}

  /* ============================================================
     단어암기 탭의 객관식 Self Test 와 동일한 CSS 구조
     (색상만 보라 → 빨강 으로 변경)
     ============================================================ */
  .qz-overlay{position:fixed;inset:0;z-index:500;background:#f5f0eb;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  .qz-header{flex-shrink:0;padding:12px 16px 8px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;}
  .qz-header-left{min-width:0;flex:1;}
  .qz-header-left .qz-name{font-family:'Inter',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#d94040;}
  .qz-header-left .qz-title{font-family:'Inter',sans-serif;font-size:1.15rem;font-weight:700;color:#1a1a2e;margin-top:2px;letter-spacing:-.5px;}
  .qz-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .qz-idx{font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;color:#1a1a2e;}
  .qz-idx span{color:#b0aab8;font-weight:400;}
  .qz-pill{font-family:'Inter',sans-serif;font-size:.55rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:10px;background:#fff0f0;color:#d94040;border:1px solid #ffcccc;}
  .qz-pill.retry{background:#fce7f3;color:#be185d;border-color:#fbcfe8;}
  .qz-pill.done{background:#ecfdf5;color:#1a9e6f;border-color:#a7f3d0;}

  .qz-prog{flex-shrink:0;padding:0 16px 10px;}
  .qz-dots{display:flex;justify-content:space-between;gap:3px;}
  .qdot{flex:1;height:4px;border-radius:2px;background:#e2dcd8;transition:background .3s;}
  .qdot.correct{background:#1a9e6f;} .qdot.wrong{background:#d94040;} .qdot.current{background:#d94040;opacity:.5;}

  .qz-viewport{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:0 12px;min-height:0;touch-action:none;user-select:none;-webkit-user-select:none;}
  .qz-close-bar{flex-shrink:0;padding:8px 16px 10px;}
  .qz-close-btn{width:100%;padding:.65rem;background:none;border:1.5px solid #e2dcd8;border-radius:10px;font-family:'Inter',sans-serif;font-size:.78rem;color:#7a8590;cursor:pointer;transition:border-color .2s;text-decoration:none;display:block;text-align:center;}
  .qz-close-btn:hover{border-color:#7a8590;}

  /* 스와이프 인디케이터 */
  .qz-ind{position:absolute;font-family:'Inter',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border-radius:10px;opacity:0;pointer-events:none;z-index:20;transition:opacity .1s;}
  .qz-ind-next{top:50%;right:16px;transform:translateY(-50%);color:#6b6b80;background:rgba(0,0,0,.05);border:1.5px solid #e2dcd8;}
  .qz-ind-prev{top:50%;left:16px;transform:translateY(-50%);color:#d94040;background:rgba(217,64,64,.08);border:1.5px solid rgba(217,64,64,.25);}

  /* 카드 */
  .qz-card{position:absolute;width:calc(100% - 24px);max-width:430px;height:100%;max-height:640px;background:#fff;border-radius:22px;border:1.5px solid #e2dcd8;box-shadow:0 8px 40px rgba(217,64,64,.08),0 2px 8px rgba(0,0,0,.05);display:flex;flex-direction:column;overflow:hidden;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform,opacity;touch-action:none;}
  .qz-card.no-tr{transition:none!important;} .qz-card.dragging{transition:none!important;}
  .qz-card-line{height:4px;flex-shrink:0;border-radius:22px 22px 0 0;background:linear-gradient(90deg,#d94040 0%,#ff9980 100%);}
  .qz-card-line.retry{background:linear-gradient(90deg,#be185d 0%,#f472b6 100%);}
  .qz-card-line.result{background:linear-gradient(90deg,#1a9e6f 0%,#6ee7b7 100%);}

  /* 카드 내용 */
  .qz-content{flex:1;display:flex;flex-direction:column;padding:14px 18px 10px;min-height:0;overflow:hidden;}
  .qz-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;flex-shrink:0;}
  .qz-badge{font-family:'Inter',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
  .qz-badge-num{background:#e2dcd8;color:#6b6b80;}
  .qz-badge-pos{background:#fff0f0;color:#d94040;border:1px solid #ffcccc;}
  .qz-prompt{text-align:center;padding:6px 0 12px;flex-shrink:0;}
  .qz-prompt-lbl{font-family:'Inter',sans-serif;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#b0aab8;margin-bottom:5px;}
  .qz-prompt-word{font-family:'Inter',sans-serif;font-size:1.9rem;font-weight:700;color:#1a1a2e;letter-spacing:-1px;line-height:1.15;word-break:break-word;}

  .qz-tts-corner{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:1.5px solid #e2dcd8;color:#6b6b80;cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:all .18s;z-index:10;touch-action:manipulation;}
  .qz-tts-corner:active{transform:scale(.88);background:#fff0f0;border-color:#d94040;color:#d94040;}
  .qz-tts-corner.playing{border-color:#d94040;color:#d94040;background:#fff0f0;animation:qz-pulse .8s ease-in-out infinite alternate;}
  @keyframes qz-pulse{from{box-shadow:0 0 0 0 rgba(217,64,64,.15)}to{box-shadow:0 0 0 6px rgba(217,64,64,0)}}

  .qz-options{display:flex;flex-direction:column;gap:7px;flex:1;min-height:0;overflow-y:auto;padding:2px;touch-action:none;}
  .qz-opt{width:100%;text-align:left;background:#fff;border:1.5px solid #e2dcd8;border-radius:12px;padding:12px 14px;font-family:'Gowun Dodum',sans-serif;font-size:.95rem;color:#1a1a2e;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:11px;line-height:1.4;touch-action:manipulation;}
  .qz-opt:active{transform:scale(.98);}
  .qz-opt-key{font-family:'Inter',sans-serif;font-size:.7rem;font-weight:700;width:24px;height:24px;border-radius:50%;background:#e2dcd8;color:#6b6b80;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
  @media (hover:hover) and (pointer:fine){
    .qz-opt:hover:not(.disabled){border-color:#d94040;background:#fff8f8;}
    .qz-opt:hover:not(.disabled) .qz-opt-key{background:#d94040;color:#fff;}
  }
  .qz-opt.correct{background:#ecfdf5;border-color:#1a9e6f;color:#065f46;pointer-events:none;}
  .qz-opt.correct .qz-opt-key{background:#1a9e6f;color:#fff;}
  .qz-opt.wrong{background:#fff0f0;border-color:#d94040;color:#991b1b;pointer-events:none;}
  .qz-opt.wrong .qz-opt-key{background:#d94040;color:#fff;}
  .qz-opt.show-answer{background:#ecfdf5;border-color:#1a9e6f;color:#065f46;pointer-events:none;}
  .qz-opt.show-answer .qz-opt-key{background:#1a9e6f;color:#fff;}
  .qz-opt.disabled{pointer-events:none;}

  /* 피드백 */
  .qz-fb{padding:9px 12px;border-radius:11px;margin-top:8px;flex-shrink:0;font-size:.8rem;line-height:1.5;display:none;}
  .qz-fb.show{display:block;animation:qz-fadein .25s ease;}
  @keyframes qz-fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .qz-fb.correct{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;}
  .qz-fb.wrong{background:#fff0f0;border:1px solid #fecaca;color:#991b1b;}
  .qz-fb-title{font-family:'Inter',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
  .qz-fb-ans{font-weight:600;font-size:.9rem;margin-bottom:2px;}
  .qz-swipe-hint{flex-shrink:0;padding:6px 0 8px;text-align:center;font-family:'Inter',sans-serif;font-size:.6rem;color:#b0aab8;letter-spacing:1px;display:none;}
  .qz-swipe-hint.show{display:block;animation:qz-fadein .3s ease;}

  /* 재시도 스테이지 */
  .qz-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;gap:12px;}
  .qz-stage-emoji{font-size:2.8rem;line-height:1;animation:qz-pop .5s cubic-bezier(.175,.885,.32,1.275);}
  @keyframes qz-pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .qz-stage-lbl{font-family:'Inter',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#d94040;}
  .qz-stage-lbl.retry{color:#be185d;}
  .qz-stage-ttl{font-size:1.35rem;font-weight:400;color:#1a1a2e;line-height:1.4;}
  .qz-stage-sub{font-size:.83rem;color:#6b6b80;line-height:1.65;padding:0 8px;}
  .qz-stage-stats{display:flex;gap:10px;margin-top:2px;}
  .qz-stat{padding:9px 16px;border:1.5px solid #e2dcd8;border-radius:12px;text-align:center;}
  .qz-stat-num{font-family:'Inter',sans-serif;font-size:1.35rem;font-weight:700;}
  .qz-stat-num.c{color:#1a9e6f;} .qz-stat-num.w{color:#d94040;}
  .qz-stat-lbl{font-family:'Inter',sans-serif;font-size:.53rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#b0aab8;margin-top:3px;}
  .qz-start-btn{background:#d94040;color:#fff;border:none;border-radius:16px;padding:13px 30px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 16px rgba(217,64,64,.25);min-height:46px;margin-top:4px;transition:transform .15s;touch-action:manipulation;}
  .qz-start-btn:active{transform:scale(.97);}
  .qz-start-btn.retry{background:#be185d;box-shadow:0 4px 16px rgba(190,24,93,.25);}

  /* 결과 */
  .qz-result{flex:1;display:flex;flex-direction:column;padding:18px 20px 12px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
  .qz-score-circle{width:130px;height:130px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;position:relative;flex-shrink:0;}
  .qz-score-circle::before{content:'';position:absolute;inset:9px;background:#fff;border-radius:50%;}
  .qz-score-inner{position:relative;text-align:center;}
  .qz-score-num{font-family:'Inter',sans-serif;font-size:2.1rem;font-weight:700;color:#1a1a2e;line-height:1;}
  .qz-score-tot{font-family:'Inter',sans-serif;font-size:.66rem;color:#b0aab8;letter-spacing:1px;margin-top:2px;}
  .qz-result-ttl{text-align:center;font-size:1.2rem;font-weight:400;color:#1a1a2e;margin-bottom:4px;}
  .qz-result-sub{text-align:center;font-size:.76rem;color:#6b6b80;margin-bottom:12px;line-height:1.5;}
  .qz-wrong-ttl{font-family:'Inter',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#d94040;margin-bottom:6px;}
  .qz-perfect{text-align:center;padding:13px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:12px;color:#065f46;font-size:.88rem;font-weight:600;}
  .qz-wrong-item{background:#fff0f0;border:1px solid #ffcccc;border-radius:10px;padding:8px 11px;margin-bottom:5px;}
  .qz-wrong-r1{display:flex;align-items:baseline;gap:6px;}
  .qz-wrong-word{font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;color:#d94040;}
  .qz-wrong-meaning{font-size:.74rem;color:#6b6b80;}
  .qz-wrong-detail{font-size:.68rem;color:#991b1b;margin-top:3px;font-style:italic;}

  /* 상태 메시지 */
  .qz-status{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;color:#6b6b80;font-size:.9rem;line-height:1.6;}
  .qz-status .emoji{font-size:2.4rem;margin-bottom:10px;display:block;}
</style>
</head>
<body>

<div class="qz-overlay" id="qz-overlay">
  <div class="qz-header">
    <div class="qz-header-left">
      <div class="qz-name" id="qz-name">바로그영어</div>
      <div class="qz-title" id="qz-title">오답 Self Test</div>
    </div>
    <div class="qz-header-right">
      <div class="qz-pill" id="qz-pill">객관식</div>
      <div class="qz-idx"><span id="qz-cur">0</span><span> / <span id="qz-tot">0</span></span></div>
    </div>
  </div>
  <div class="qz-prog"><div class="qz-dots" id="qz-dots"></div></div>
  <div class="qz-viewport" id="qz-viewport">
    <div class="qz-ind qz-ind-prev" id="qz-ind-prev">← PREV</div>
    <div class="qz-ind qz-ind-next" id="qz-ind-next">NEXT →</div>
    <div class="qz-status" id="qz-status">
      <span class="emoji">⏳</span>
      데이터를 불러오는 중...
    </div>
  </div>
  <div class="qz-close-bar">
    <a class="qz-close-btn" href="wrong-words.html">✕ 종료하고 폴더로</a>
  </div>
</div>

<script>
/* ============================================================
   ★ 학생별 설정 — wrong-words.html / wrong-flashcard.html 과 동일하게
   ============================================================ */
const STUDENT_NAME = '조문주';
const SHEET_GID    = '865669929';
const SHEET_CSV_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQyO-Sx_N0LFENgIcQp-3ATAHrYOUvLCuEr2Nls8qYKYMnOTRyo5_zJY1hbyA1ONfzcf2UK7kwe3fTP/pub?output=csv';
/* ============================================================ */

/* URL 파라미터 */
const params = new URLSearchParams(location.search);
const PARAM_DATE  = params.get('date') || '';
const PARAM_START = params.get('start') || PARAM_DATE;
const PARAM_END   = params.get('end') || PARAM_DATE;
const PARAM_SET   = params.get('set') || '';
const STARRED_MODE = params.get('starred') === '1';

const STARRED_KEY = 'starred_words_' + STUDENT_NAME;

/* ============================================================
   퀴즈 상태 — 단어암기 탭의 qz* 변수와 동일한 구조
   ============================================================ */
let qzQueue = [];
let qzPos = 0;
let qzAnswered = false;
let qzWrong = [];
let qzStage = 'mc';            // 'mc' | 'retry' | 'result'
let qzOriginalTotal = 0;
let qzCardEl = null;
let qzAnim = false;
let _audio = null;
let _qzSwipeInit = false;

/* ============================================================
   유틸
   ============================================================ */
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function qzShuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function qzHaptic(ms=8){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(_){}}
function parseCSV(text){
  const rows=[];
  let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){
        if(text[i+1]==='"'){cur+='"';i++;}
        else inQ=false;
      } else cur+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===','){row.push(cur);cur='';}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(ch==='\r'){/* skip */}
      else cur+=ch;
    }
  }
  if(cur||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function normDate(s){
  if(!s) return '';
  const m=String(s).trim().match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  if(!m) return '';
  return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
}

function showStatus(emoji, msg) {
  const vp = document.getElementById('qz-viewport');
  /* 카드/스테이지가 있으면 제거 */
  vp.querySelectorAll('.qz-card').forEach(c => c.remove());
  qzCardEl = null;
  let st = document.getElementById('qz-status');
  if(!st) {
    st = document.createElement('div');
    st.id = 'qz-status';
    st.className = 'qz-status';
    vp.appendChild(st);
  }
  st.innerHTML = `<span class="emoji">${emoji}</span>${msg}`;
  st.style.display = 'flex';
}
function hideStatus() {
  const st = document.getElementById('qz-status');
  if(st) st.style.display = 'none';
}

function getStarredCards() {
  try {
    const map = JSON.parse(localStorage.getItem(STARRED_KEY) || '{}');
    return Object.values(map).sort((a,b) => (b.starredAt||0) - (a.starredAt||0));
  } catch { return []; }
}

/* ============================================================
   TTS
   ============================================================ */
function ttsPlay(word, btn) {
  if(_audio) {
    try { _audio.pause(); } catch(e){}
    _audio = null;
    document.querySelectorAll('.qz-tts-corner.playing').forEach(b => b.classList.remove('playing'));
    if(btn && btn.dataset.playing === 'true') {
      btn.dataset.playing = '';
      return;
    }
  }
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(word)}`;
  const audio = new Audio(url);
  _audio = audio;
  if(btn) { btn.classList.add('playing'); btn.dataset.playing = 'true'; }
  audio.onended = () => { if(btn){btn.classList.remove('playing');btn.dataset.playing='';} _audio=null; };
  audio.onerror = () => { if(btn){btn.classList.remove('playing');btn.dataset.playing='';} _audio=null; };
  audio.play().catch(() => { if(btn){btn.classList.remove('playing');btn.dataset.playing='';} _audio=null; });
}

/* ============================================================
   객관식 보기 4개 구성 (단어암기 탭의 qzBuildOpts 와 동일)
   ============================================================ */
function qzBuildOpts(target, pool) {
  const opts = [target.meaning];
  const others = qzShuffle(pool.filter(w => w.meaning !== target.meaning));
  for(const w of others) {
    if(opts.length >= 4) break;
    if(!opts.includes(w.meaning)) opts.push(w.meaning);
  }
  return qzShuffle(opts);
}

/* ============================================================
   진행도 dots / pill (단어암기 탭과 동일)
   ============================================================ */
function qzUpdatePill(){
  const p = document.getElementById('qz-pill');
  if(qzStage==='mc'){ p.textContent='객관식'; p.className='qz-pill'; }
  else if(qzStage==='retry'){ p.textContent='재시도'; p.className='qz-pill retry'; }
  else{ p.textContent='완료'; p.className='qz-pill done'; }
}
function qzBuildDots(){
  const w = document.getElementById('qz-dots');
  w.innerHTML='';
  qzQueue.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'qdot';
    d.id = `qdot-${i}`;
    w.appendChild(d);
  });
}
function qzUpdateDots(){
  qzQueue.forEach((q,i)=>{
    const d = document.getElementById(`qdot-${i}`);
    if(!d) return;
    d.className = 'qdot' + (q._result==='correct'?' correct':q._result==='wrong'?' wrong':i===qzPos?' current':'');
  });
  document.getElementById('qz-cur').textContent = Math.min(qzPos+1, qzQueue.length);
  document.getElementById('qz-tot').textContent = qzQueue.length;
}

/* ============================================================
   카드 swap 애니메이션 (단어암기 탭과 동일)
   ============================================================ */
function qzSwapCard(html, dir) {
  return new Promise(res => {
    const vp = document.getElementById('qz-viewport');
    const old = qzCardEl;
    const el = document.createElement('div');
    el.className = 'qz-card no-tr';
    el.innerHTML = html;
    if(dir !== 0) el.style.transform = `translateX(${dir>0?'100%':'-100%'})`;
    else el.style.opacity = '0';
    vp.appendChild(el);
    qzCardEl = el;
    qzAnim = true;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.classList.remove('no-tr');
      el.style.transform = 'translateX(0)';
      el.style.opacity = '1';
      if(old) {
        old.classList.remove('no-tr');
        old.style.transform = `translateX(${dir>0?'-100%':'100%'})`;
        old.style.opacity = '0.3';
        setTimeout(() => { old.remove(); qzAnim = false; res(); }, 360);
      } else {
        setTimeout(() => { qzAnim = false; res(); }, 360);
      }
    }));
  });
}
async function qzRenderStage(html, dir=0){ await qzSwapCard(html, dir); }

/* ============================================================
   문제 렌더 (단어암기 탭과 동일) — 자동 진행 없음
   ============================================================ */
async function qzRenderQ(dir=1) {
  qzAnswered = qzQueue[qzPos]._result !== null;
  const q = qzQueue[qzPos];

  const optsHTML = q._opts.map((opt,i) => {
    const key = String.fromCharCode(65+i);
    const cls = q._result
      ? (opt===q.meaning
          ? (q._result==='correct'?'qz-opt correct disabled':'qz-opt show-answer disabled')
          : opt===q._picked ? 'qz-opt wrong disabled' : 'qz-opt disabled')
      : 'qz-opt';
    const dataAttr = q._result ? '' : `data-opt="${esc(opt)}"`;
    return `<button class="${cls}" type="button" ${dataAttr}><span class="qz-opt-key">${key}</span><span>${esc(opt)}</span></button>`;
  }).join('');

  const fb = q._result
    ? (q._result==='correct'
        ? `<div class="qz-fb correct show"><div class="qz-fb-title">✓ 정답!</div><div class="qz-fb-ans">${esc(q.word)} — ${esc(q.meaning)}</div></div>`
        : `<div class="qz-fb wrong show"><div class="qz-fb-title">✗ 오답</div><div class="qz-fb-ans">정답: ${esc(q.meaning)}</div></div>`)
    : '';
  const hint = q._result
    ? `<div class="qz-swipe-hint show">${qzPos<qzQueue.length-1?'← 스와이프해서 다음 문제':'← 스와이프해서 결과 보기'}</div>`
    : '';

  await qzRenderStage(`
    <div class="qz-card-line${qzStage==='retry'?' retry':''}"></div>
    <button class="qz-tts-corner" type="button" data-word="${esc(q.word)}">🔊</button>
    <div class="qz-content">
      <div class="qz-badges">
        <span class="qz-badge qz-badge-num">오답</span>
        ${q.pos && q.pos!=='-' ? `<span class="qz-badge qz-badge-pos">${esc(q.pos)}</span>` : ''}
      </div>
      <div class="qz-prompt">
        <div class="qz-prompt-lbl">English</div>
        <div class="qz-prompt-word">${esc(q.word)}</div>
      </div>
      <div class="qz-options">${optsHTML}</div>
      ${fb}
    </div>${hint}`, dir);

  /* 이벤트 리스너 등록 (카드 swap 이후) */
  if(qzCardEl) {
    if(document.activeElement && typeof document.activeElement.blur==='function') document.activeElement.blur();
    qzCardEl.querySelectorAll('.qz-opt[data-opt]').forEach(btn => {
      btn.addEventListener('click', () => qzAnswer(btn, btn.dataset.opt));
    });
    const tts = qzCardEl.querySelector('.qz-tts-corner');
    if(tts) tts.addEventListener('click', e => { e.stopPropagation(); ttsPlay(tts.dataset.word, tts); });
  }
  qzUpdateDots();

  /* ★ 새 문제 자동 발음 — 아직 답 입력 안 한 문제일 때만
     (이전 문제로 돌아간 경우엔 q._result 가 있으므로 재생 안 함) */
  if(!q._result) {
    setTimeout(() => {
      const ttsBtn = qzCardEl ? qzCardEl.querySelector('.qz-tts-corner') : null;
      if(ttsBtn) ttsPlay(q.word, ttsBtn);
    }, 280);
  }
}

/* ============================================================
   답 처리 — 단어암기 탭과 동일 (자동 진행 X)
   ============================================================ */
function qzAnswer(btn, chosen) {
  const q = qzQueue[qzPos];
  if(q._result) return;
  const isOk = chosen === q.meaning;
  q._picked = chosen;
  q._result = isOk ? 'correct' : 'wrong';
  qzHaptic(isOk ? 8 : 15);
  if(!isOk) qzWrong.push(q);
  qzAnswered = true;

  document.querySelectorAll('.qz-opt').forEach(b => {
    b.classList.add('disabled');
    b.onclick = null;
    const txt = b.querySelector('span:last-child').textContent;
    if(txt === q.meaning) b.classList.add(isOk ? 'correct' : 'show-answer');
    else if(b === btn && !isOk) b.classList.add('wrong');
  });

  const fb = isOk
    ? `<div class="qz-fb correct show"><div class="qz-fb-title">✓ 정답!</div><div class="qz-fb-ans">${esc(q.word)} — ${esc(q.meaning)}</div></div>`
    : `<div class="qz-fb wrong show"><div class="qz-fb-title">✗ 오답</div><div class="qz-fb-ans">정답: ${esc(q.meaning)}</div></div>`;
  qzCardEl.querySelector('.qz-content').insertAdjacentHTML('beforeend', fb);

  const hint = document.createElement('div');
  hint.className = 'qz-swipe-hint show';
  hint.textContent = qzPos<qzQueue.length-1 ? '← 스와이프해서 다음 문제' : '← 스와이프해서 결과 보기';
  qzCardEl.appendChild(hint);
  qzUpdateDots();
}

/* ============================================================
   다음 / 이전 — 단어암기 탭과 동일
   ============================================================ */
function qzGoNext() {
  qzPos++;
  if(qzPos < qzQueue.length) { qzRenderQ(1); return; }
  /* mc 단계 끝났는데 틀린 문제 있으면 → 재시도 안내 */
  if(qzStage==='mc' && qzWrong.length>0) { qzRetryIntro(); return; }
  /* retry 단계 끝났는데 아직도 틀린 문제 있으면 → 다시 retry */
  if(qzStage==='retry') {
    const still = qzQueue.filter(q => q._result==='wrong');
    if(still.length > 0) {
      const pool = optsPoolForRetry();
      qzQueue = still.map(w => ({ ...w, _opts: qzBuildOpts(w, pool), _result: null, _picked: null }));
      qzPos = 0;
      qzBuildDots();
      qzRenderQ(1);
      return;
    }
  }
  qzRenderResult();
}
function qzGoPrev() {
  if(qzPos > 0) { qzPos--; qzRenderQ(-1); }
}

/* ============================================================
   재시도 단계 진입
   ============================================================ */
function qzRetryIntro() {
  qzStage = 'retry';
  qzUpdatePill();
  qzRenderStage(`
    <div class="qz-card-line retry"></div>
    <div class="qz-stage">
      <div class="qz-stage-emoji">🔄</div>
      <div class="qz-stage-lbl retry">재시도</div>
      <div class="qz-stage-ttl">1차 완료!</div>
      <div class="qz-stage-stats">
        <div class="qz-stat"><div class="qz-stat-num c">${qzQueue.length-qzWrong.length}</div><div class="qz-stat-lbl">맞음</div></div>
        <div class="qz-stat"><div class="qz-stat-num w">${qzWrong.length}</div><div class="qz-stat-lbl">틀림</div></div>
      </div>
      <div class="qz-stage-sub">틀린 ${qzWrong.length}문제를 다시 풀어볼게요.<br>다 맞히면 결과 화면으로 넘어가요.</div>
      <button class="qz-start-btn retry" id="qz-retry-btn">다시 풀기 →</button>
    </div>`, 1);
  /* 버튼 리스너 — qzCardEl swap 후 등록 */
  setTimeout(() => {
    const btn = document.getElementById('qz-retry-btn');
    if(btn) btn.addEventListener('click', qzStartRetry);
  }, 400);
}
function qzStartRetry() {
  const pool = optsPoolForRetry();
  qzQueue = qzWrong.map(w => ({ ...w, _opts: qzBuildOpts(w, pool), _result: null, _picked: null }));
  qzPos = 0;
  qzBuildDots();
  qzRenderQ(1);
}

/* 재시도 단계의 보기 풀 — 원본 큐 + qzWrong 통합 */
let _origPool = [];
function optsPoolForRetry() {
  return _origPool.length ? _origPool : qzQueue;
}

/* ============================================================
   결과 — 자가학습이므로 "선생님께 제출" 버튼 없음, "다시 풀기"만
   ============================================================ */
function qzRenderResult() {
  qzStage = 'result';
  qzUpdatePill();
  document.getElementById('qz-dots').innerHTML = '';
  document.getElementById('qz-cur').textContent = '✓';
  const allTotal = qzOriginalTotal;
  const stillWrong = qzWrong.filter(w => w._result==='wrong').length;
  const correct = allTotal - stillWrong;
  const pct = allTotal ? Math.round(correct/allTotal*100) : 0;
  const col = pct>=80?'#1a9e6f':pct>=60?'#e3502d':'#d94040';
  const deg = Math.round((pct/100)*360);
  const wrongHTML = stillWrong === 0
    ? `<div class="qz-perfect">🏆 모든 문제를 맞혔어요!</div>`
    : `<div><div class="qz-wrong-ttl">📌 다시 봐야 할 단어 (${stillWrong}개)</div>
        ${qzWrong.filter(w => w._result==='wrong').map(w => `
          <div class="qz-wrong-item">
            <div class="qz-wrong-r1"><span class="qz-wrong-word">${esc(w.word)}</span><span class="qz-wrong-meaning">${esc(w.meaning)}</span></div>
            <div class="qz-wrong-detail">'${esc(w._picked)}' 선택</div>
          </div>`).join('')}</div>`;

  qzRenderStage(`
    <div class="qz-card-line result"></div>
    <div class="qz-result">
      <div class="qz-score-circle" style="background:conic-gradient(${col} 0deg ${deg}deg,#e2dcd8 ${deg}deg 360deg)">
        <div class="qz-score-inner"><div class="qz-score-num">${pct}<span style="font-size:1.1rem">%</span></div><div class="qz-score-tot">${correct}/${allTotal}</div></div>
      </div>
      <div class="qz-result-ttl">수고했어요! 🎉</div>
      <div class="qz-result-sub">정답률 ${pct}%</div>
      ${wrongHTML}
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">
        <button class="qz-start-btn" style="width:100%" id="qz-restart-btn">↻ 다시 풀기</button>
        <a href="wrong-words.html" class="qz-close-btn" style="text-decoration:none">오답 폴더로 돌아가기</a>
      </div>
    </div>`, 1);
  setTimeout(() => {
    const r = document.getElementById('qz-restart-btn');
    if(r) r.addEventListener('click', restartFromTop);
  }, 400);
}

/* 처음부터 다시 풀기 — 원본 큐로 복원 */
let _initialCards = [];
function restartFromTop() {
  /* 원본 카드들로 큐 재구성 */
  const pool = _initialCards;
  qzQueue = qzShuffle(pool.slice()).map(w => ({
    ...w,
    _opts: qzBuildOpts(w, pool),
    _result: null, _picked: null
  }));
  qzPos = 0;
  qzAnswered = false;
  qzWrong = [];
  qzStage = 'mc';
  qzOriginalTotal = qzQueue.length;
  qzUpdatePill();
  qzBuildDots();
  qzRenderQ(1);
}

/* ============================================================
   스와이프 (단어암기 탭과 동일)
   ============================================================ */
function qzInitSwipe() {
  if(_qzSwipeInit) return;
  _qzSwipeInit = true;
  const vp = document.getElementById('qz-viewport');
  let sX=0, sY=0, tracking=false, locked=null, pid=null;
  function canNext(){ return !qzAnim && (qzStage==='mc' || qzStage==='retry') && qzAnswered; }
  function canPrev(){ return !qzAnim && (qzStage==='mc' || qzStage==='retry') && qzPos>0; }
  function start(x,y){ tracking=true; locked=null; sX=x; sY=y; if(qzCardEl) qzCardEl.classList.add('dragging'); }
  function move(x,y,ev){
    if(!tracking) return;
    const dx=x-sX, dy=y-sY;
    if(locked===null && (Math.abs(dx)>8 || Math.abs(dy)>8)) locked = Math.abs(dx)>Math.abs(dy) ? 'h' : 'v';
    if(locked==='h'){
      if(ev && ev.cancelable) ev.preventDefault();
      if(!qzCardEl) return;
      const block = (dx<0 && !canNext()) || (dx>0 && !canPrev());
      qzCardEl.style.transform = `translateX(${dx*(block?.15:.55)}px)`;
      const t = Math.min(Math.abs(dx)/70, 1);
      document.getElementById('qz-ind-prev').style.opacity = (dx>8 && canPrev()) ? String(t*.9) : '0';
      document.getElementById('qz-ind-next').style.opacity = (dx<-8 && canNext()) ? String(t*.9) : '0';
    }
  }
  function end(ex){
    if(!tracking){ tracking=false; return; }
    tracking = false;
    document.getElementById('qz-ind-prev').style.opacity='0';
    document.getElementById('qz-ind-next').style.opacity='0';
    if(qzCardEl) qzCardEl.classList.remove('dragging');
    const dx = ex-sX;
    if(locked==='h' && Math.abs(dx)>40){
      if(dx<0 && canNext()){ if(qzCardEl) qzCardEl.style.transform=''; qzGoNext(); }
      else if(dx>0 && canPrev()){ if(qzCardEl) qzCardEl.style.transform=''; qzGoPrev(); }
      else {
        if(qzCardEl){
          qzCardEl.style.transition='transform .3s cubic-bezier(.175,.885,.32,1.275)';
          qzCardEl.style.transform='translateX(0)';
          setTimeout(()=>{ if(qzCardEl) qzCardEl.style.transition=''; }, 320);
        }
      }
    } else { if(qzCardEl) qzCardEl.style.transform=''; }
    locked = null;
  }
  if(window.PointerEvent){
    vp.addEventListener('pointerdown', e => { if(pid!==null) return; pid=e.pointerId; start(e.clientX, e.clientY); }, {capture:true});
    vp.addEventListener('pointermove', e => { if(e.pointerId!==pid) return; move(e.clientX, e.clientY, e); }, {capture:true});
    vp.addEventListener('pointerup',   e => { if(e.pointerId!==pid) return; pid=null; end(e.clientX); }, {capture:true});
    vp.addEventListener('pointercancel', e => { if(e.pointerId!==pid) return; pid=null; if(qzCardEl) qzCardEl.style.transform=''; locked=null; tracking=false; }, {capture:true});
  } else {
    vp.addEventListener('touchstart', e => { if(e.touches.length!==1) return; start(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true, capture:true});
    vp.addEventListener('touchmove',  e => { if(!tracking || e.touches.length!==1) return; move(e.touches[0].clientX, e.touches[0].clientY, e); }, {passive:false, capture:true});
    vp.addEventListener('touchend',   e => { if(!e.changedTouches.length) return; end(e.changedTouches[0].clientX); }, {passive:true, capture:true});
  }
}

/* 키보드 화살표 — 답 후에만 다음 가능 */
document.addEventListener('keydown', (e) => {
  if(!qzQueue.length) return;
  const curQ = qzQueue[qzPos];
  if(e.key === 'ArrowRight' && curQ && curQ._result) { e.preventDefault(); qzGoNext(); }
  else if(e.key === 'ArrowLeft' && qzPos>0) { e.preventDefault(); qzGoPrev(); }
});

/* ============================================================
   퀴즈 시작 — cards = [{ word, meaning, pos }]
   ============================================================ */
function startQuiz(cards, title) {
  document.getElementById('qz-title').textContent = title;
  /* 원본 카드 백업 (다시 풀기용) */
  _initialCards = cards.map(c => ({ ...c }));
  _origPool = cards.slice();
  /* 큐 구성 */
  qzQueue = qzShuffle(cards.slice()).map(w => ({
    ...w,
    _opts: qzBuildOpts(w, cards),
    _result: null, _picked: null
  }));
  qzPos = 0;
  qzAnswered = false;
  qzWrong = [];
  qzStage = 'mc';
  qzOriginalTotal = qzQueue.length;
  hideStatus();
  qzUpdatePill();
  qzBuildDots();
  qzRenderQ(0);
  qzInitSwipe();
}

/* ============================================================
   데이터 로딩
   ============================================================ */
async function loadData() {
  document.getElementById('qz-name').textContent = `바로그영어 · ${STUDENT_NAME}`;
  document.title = `오답 Self Test – ${STUDENT_NAME}`;

  /* ----- 모드 1: 별표 단어 Self Test ----- */
  if(STARRED_MODE) {
    const starred = getStarredCards();
    if(!starred.length) {
      showStatus('⭐', '아직 별표한 단어가 없어요.<br><span style="font-size:0.78rem;color:#b0aab8">플래시카드에서 ☆ 버튼으로 표시해 주세요</span>');
      return;
    }
    /* 별표 데이터 → { word, meaning, pos } 형태로 변환 (meaning ← correct) */
    let cards = starred.map(s => ({
      word:    s.word,
      meaning: s.correct,
      pos:     s.pos || ''
    }));
    /* 4개 미만이면 시트에서 다른 오답들로 보충 */
    if(cards.length < 4) {
      showStatus('⏳', '보기를 만들기 위해 다른 오답 단어를 불러오는 중...');
      try {
        const res = await fetch(`${SHEET_CSV_BASE}&gid=${SHEET_GID}&t=${Date.now()}`);
        if(res.ok) {
          const rows = parseCSV(await res.text());
          let startRow = 0;
          if(rows.length && String(rows[0][0]||'').trim()==='날짜') startRow = 1;
          for(let i=startRow; i<rows.length; i++){
            const r = rows[i];
            if(!r || r.length<5) continue;
            const word = String(r[2]||'').trim();
            const meaning = String(r[4]||'').trim();
            if(!word || !meaning) continue;
            if(cards.some(c => c.meaning === meaning)) continue;
            cards.push({ word, meaning, pos: String(r[5]||'').trim() });
            if(cards.length >= 30) break;
          }
        }
      } catch(e) { console.warn('보기 풀 보충 실패:', e); }
    }
    if(cards.length < 4) {
      showStatus('📊', `객관식 4지선다를 만들기에 단어가 부족해요.<br><span style="font-size:0.78rem;color:#b0aab8">전체 풀 ${cards.length}개</span>`);
      return;
    }
    /* 별표 모드에서 진짜로 풀 단어는 starred 만큼만 — 보충된 단어들은 보기 풀에만 사용 */
    const starredCount = starred.length;
    const playList = cards.slice(0, starredCount); // 앞쪽이 별표 단어
    startQuiz(playList, '⭐ 별표 단어 · Self Test');
    /* 원본 보기 풀을 전체 cards 로 덮어쓰기 (보기 다양성 확보) */
    _origPool = cards.slice();
    /* qzQueue 의 _opts 를 전체 풀 기준으로 재구성 */
    qzQueue.forEach(q => { q._opts = qzBuildOpts(q, cards); });
    return;
  }

  /* ----- 모드 2: 날짜+세트 Self Test (시트 fetch) ----- */
  if(!PARAM_START) {
    showStatus('⚠️', '날짜 정보가 없어요.<br><span style="font-size:0.8rem;color:#b0aab8">예: wrong-quiz.html?date=2026-05-17</span>');
    return;
  }
  try {
    const res = await fetch(`${SHEET_CSV_BASE}&gid=${SHEET_GID}&t=${Date.now()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = parseCSV(await res.text());
    let startRow = 0;
    if(rows.length && String(rows[0][0]||'').trim()==='날짜') startRow = 1;

    const cards = [];
    let groupTitle = '';
    for(let i=startRow; i<rows.length; i++) {
      const r = rows[i];
      if(!r || r.length<5) continue;
      const dateStr = normDate(r[0]);
      if(!dateStr) continue;
      if(dateStr < PARAM_START || dateStr > PARAM_END) continue;
      const set = String(r[8]||'').trim();
      if(PARAM_SET && set !== PARAM_SET) continue;
      const word = String(r[2]||'').trim();
      const meaning = String(r[4]||'').trim();
      const pos = String(r[5]||'').trim();
      const title = String(r[9]||'').trim();
      if(!word || !meaning) continue;
      if(!groupTitle && title) groupTitle = title;
      cards.push({ word, meaning, pos: pos||'' });
    }
    if(cards.length === 0) {
      showStatus('📭', `${STUDENT_NAME}의 오답 데이터가 없어요.`);
      return;
    }
    if(cards.length < 4) {
      showStatus('📊', `객관식 4지선다를 만들기에 단어가 부족해요.<br><span style="font-size:0.78rem;color:#b0aab8">현재 ${cards.length}개</span>`);
      return;
    }
    const p = PARAM_START.split('-');
    const subTitle = groupTitle || `${parseInt(p[1])}월 ${parseInt(p[2])}일 오답`;
    startQuiz(cards, `${subTitle} · Self Test`);
  } catch(err) {
    showStatus('⚠️', `데이터를 불러오지 못했어요.<br><span style="font-size:0.78rem;color:#b0aab8">${err.message}</span>`);
  }
}

loadData();
</script>
